name: TheBerryHost 每日领取
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00（北京时间 09:00）
jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      WORK_DIR: berryhost
      
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: yeye296/Auto-Renew-Scripts
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb fonts-noto-cjk

      - name: Install Python dependencies
        working-directory: scripts/discord
        run: |
          pip install -r requirements.txt -q > /dev/null 2>&1
          seleniumbase install chromedriver

      - name: 🛡️ 启动 Gost 代理
        env:
            GOST_PROXY: ${{ secrets.DS_PROXY }}
        run: |
          if [[ -z "$GOST_PROXY" ]]; then
            echo "⏭️ 未配置代理，跳过代理启动步骤..."
            exit 0
          fi
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          echo "启动 Gost 转发隧道..."
          nohup ./gost -L http://:10808 -F="$GOST_PROXY" > gost.log 2>&1 &
          echo "DS_PROXY=http://127.0.0.1:10808" >> $GITHUB_ENV
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:10808 https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'

      - name: Run Python script
        id: py_step
        working-directory: scripts/discord
        env:
            PYTHONIOENCODING: utf-8
            DS_USERNAME: ${{ secrets.DS_USERNAME }}
            DS_PASSWORD: ${{ secrets.DS_PASSWORD }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python app.py

      - name: 🎮 执行每日领取
        working-directory: scripts/${{ env.WORK_DIR }}
        env:
          DISCORD_TOKEN: ${{ fromJSON(steps.py_step.outputs.result).token }}
          SESSION_ID: ${{ fromJSON(steps.py_step.outputs.result).session_id }}
          GOST_PROXY: ${{ env.DS_PROXY }}
        run: |
          if [[ -z "$DISCORD_TOKEN" || -z "$SESSION_ID" ]]; then
            echo "⚠️ 警告：检测到凭证缺失！"
            exit 1
          fi
          bash renew.sh

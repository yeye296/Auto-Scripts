name: 🎮 FreezeHost 自动续期
on:
  schedule:
    - cron: '0 5 */3 * *'   # 每天 UTC 00:00 = 北京时间 08:00
  workflow_dispatch:

jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      WORK_DIR: freezehost

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: yeye296/Auto-Renew-Scripts
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb fonts-noto-cjk

      - name: 📦 安装 Python 依赖
        working-directory: scripts/${{ env.WORK_DIR }}
        run: |
          pip install -r requirements.txt -q > /dev/null 2>&1
          seleniumbase install chromedriver

      - name: 🛡️ 启动 Gost 代理
        env:
            GOST_PROXY: ${{ secrets.DS_PROXY }}
        run: |
          if [[ -z "$GOST_PROXY" ]]; then
            echo "⏭️ 未配置代理，跳过代理启动步骤..."
            exit 0
          fi
          VERSION=$(curl -s --retry 5 --retry-delay 3 --retry-all-errors https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          VERSION=${VERSION:-2.11.5}
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          echo "启动 Gost 转发隧道..."
          nohup ./gost -L http://:9090 -F="$GOST_PROXY" > gost.log 2>&1 &
          echo "DS_PROXY=http://127.0.0.1:9090" >> $GITHUB_ENV
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:9090 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: Run Python script
        id: py_step
        working-directory: scripts/discord
        env:
            PYTHONIOENCODING: utf-8
            DS_USERNAME: ${{ secrets.DS_USERNAME }}
            DS_PASSWORD: ${{ secrets.DS_PASSWORD }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python app.py

      - name: 🚀 运行续期脚本
        working-directory: scripts/${{ env.WORK_DIR }}
        env:
          DISCORD_TOKEN: ${{ fromJSON(steps.py_step.outputs.result).token }}
        run: |
          if [[ -z "$DISCORD_TOKEN" ]]; then
            echo "⚠️ 警告：检测到凭证缺失！"
            exit 1
          fi
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python app.py
      
      - name: Commit and Push Cookie Update
        if: success()
        # 保持在仓库根目录操作 git
        working-directory: scripts
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          COOKIE_JSON="${WORK_DIR}/cookies.json"
          if [[ -n $(git status -s "$COOKIE_JSON" 2>/dev/null) ]]; then
            echo "检测到 $COOKIE_JSON 更新"
            git add "$COOKIE_JSON"
            echo "正在提交 Cookie..."
            git commit -m "Auto-update auth cookie in ${WORK_DIR} [skip ci]"
            git push
          else
            echo "Cookie 无变化，跳过提交。"
          fi

      - name: 上传截图产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          # 👇 使用变量拼接路径
          path: scripts/${{ env.WORK_DIR }}/screenshots/
          if-no-files-found: ignore
          retention-days: 7

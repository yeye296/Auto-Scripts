name: Host2Play Auto Renew

on:
  schedule:
    - cron: '0 8 */2 * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    # 👇 在这里定义全局变量，后续修改目录名只需改这一个地方
    env:
      WORK_DIR: host2play  # 你的目标子项目目录名

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: yeye296/Auto-Renew-Scripts
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🗂️ 缓存 验证码 破解模块
        id: cache-captcha-solver
        uses: actions/cache@v4
        with:
          path: scripts/${{ env.WORK_DIR }}/captcha_solver
          key: captcha-solver-chromium-latest-v1

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable xvfb

      - name: 🐍 安装 Python 依赖
        run: pip install seleniumbase

      - name: 🔧 安装 ChromeDriver
        if: steps.cache-chromedriver.outputs.cache-hit != 'true'
        run: seleniumbase install chromedriver

      - name: 🧩 初始化浏览器环境
        if: steps.cache-captcha-solver.outputs.cache-hit != 'true'
        working-directory: scripts/${{ env.WORK_DIR }}
        env:
          SOLVER_URL: ${{ secrets.SOLVER_URL }}
        run: |
          wget -q "$SOLVER_URL" -O solver.zip
          unzip -qq solver.zip -d solver_raw
          MANIFEST=$(find solver_raw -name "manifest.json" | head -1)
          mkdir -p captcha_solver
          cp -r "$(dirname $MANIFEST)/." captcha_solver/
          rm -rf solver_raw solver.zip

      # - name: Setup WARP
      #   continue-on-error: true
      #   timeout-minutes: 5
      #   uses: fscarmen/warp-on-actions@v1.4
      #   with:
      #     stack: dual        # Optional. Support [ ipv4, ipv6, dual ]. Default is dual.
      #     mode: wireguard    # Optional. Support [ wireguard, client ]. Default is wireguard. 

      - name: 🛡️ 启动 Gost 代理
        env:
            GOST_PROXY: ${{ secrets.HOST2PLAY_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          echo "启动 Gost 转发隧道..."
          nohup ./gost -L http://:10808 -F="$GOST_PROXY" > gost.log 2>&1 &
          echo "CHROME_PROXY=http://127.0.0.1:10808" >> $GITHUB_ENV
          sleep 3
          IP=$(curl -s -x http://127.0.0.1:10808 https://api.ipify.org)
          IP_MASKED=$(echo "$IP" | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1xx/')
          echo "✅ GOST 已启动，出口IP确认：$IP_MASKED"

      - name: Run renew script
        timeout-minutes: 30
        env:
            PYTHONIOENCODING: utf-8
            RENEW_URL: ${{ secrets.HOST2PLAY_RENEW_URL }}
        # 👇 使用变量拼接路径
        working-directory: scripts/${{ env.WORK_DIR }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python app.py

      - name: 上传截图产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          # 👇 使用变量拼接路径
          path: scripts/${{ env.WORK_DIR }}/screenshots/
          if-no-files-found: ignore
          retention-days: 7

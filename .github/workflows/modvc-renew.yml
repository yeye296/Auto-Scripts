name: ModVC-Renew

on:
  schedule:
    - cron: '17 8 */5 * *'  # 每5天执行一次
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    # 👇 在这里定义全局变量，后续修改目录名只需改这一个地方
    env:
      WORK_DIR: modvc  # 你的目标子项目目录名

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: yeye296/Auto-Renew-Scripts
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🐍 安装依赖
        run: pip install requests pysocks

      - name: 🛡️ 启动 GOST 代理转发
        env:
          GOST_PROXY: ${{ secrets.MODVC_PROXY }}
        run: |
          if [[ -z "$GOST_PROXY" ]]; then
            echo "⏭️ 未配置代理，跳过代理启动步骤..."
            exit 0
          fi
          VERSION=$(curl -s --retry 5 --retry-delay 3 --retry-all-errors https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          VERSION=${VERSION:-2.12.0}
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:9090 -F="$GOST_PROXY" > gost.log 2>&1 &
          echo "GOST_PROXY=http://127.0.0.1:9090" >> $GITHUB_ENV
          sleep 3
          IP=$(curl -s -x http://127.0.0.1:9090 https://api.ipify.org)
          IP_MASKED=$(echo "$IP" | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1xx/')
          echo "✅ GOST 已启动，出口IP确认：$IP_MASKED"

      - name: 🔄 执行自动续期
        # 👇 使用变量拼接路径
        working-directory: scripts/${{ env.WORK_DIR }}
        env:
          MODVC_REFRESH_TOKEN: ${{ secrets.MODVC_REFRESH_TOKEN }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: python app.py

name: MyMc-Start

on:
  workflow_dispatch:
  schedule:
    - cron: '5 1 * * *'

jobs:
  run_start:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WORK_DIR: mymc

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: yeye296/Auto-Renew-Scripts
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
          fetch-depth: 1

      - name: Setup Node.js Version
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 显式指定使用 Node.js 22 版本

      - name: 📦 安装 Node.js 依赖
        working-directory: scripts/${{ env.WORK_DIR }}
        run: npm install ws

      - name: 启用 WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 配置 DNS 并验证 WARP
        run: |
          set -euo pipefail
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 3
          for i in {1..30}; do
            status=$(curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+' || echo unknown)
            [[ "$status" =~ ^(on|plus)$ ]] && echo "WARP 已连接" && break
            echo "WARP 连接中... ($i/30)"
            sleep 2
          done
          echo -n "出口 IP: " && curl -s https://api.ipify.org && echo

      - name: 🚀 运行脚本
        working-directory: scripts/${{ env.WORK_DIR }}
        run: node index.js
